# 生产环境 Docker Compose 配置
# 使用方法: docker-compose -f docker-compose.prod.yml up -d

services:
  # MySQL 数据库服务（可选：如果使用云数据库，可以删除此服务）
  db:
    image: mysql:8.0
    container_name: fyp_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me}
      MYSQL_DATABASE: ${DB_NAME:-db_exam}
      MYSQL_USER: ${DB_USER:-examuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data_prod:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"  # 只允许本地访问
    networks:
      - fyp_network_prod
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Django 后端服务
  backend:
    build:
      context: ./source/server
      dockerfile: ../../docker/backend/Dockerfile
    container_name: fyp_backend_prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
      echo '等待数据库就绪...' &&
      until python -c \"import pymysql; pymysql.connect(host='${DB_HOST:-db}',user='${DB_USER:-examuser}',password='${DB_PASSWORD:-change-me}',db='${DB_NAME:-db_exam}').close()\" 2>/dev/null; do
        echo '  MySQL 尚未就绪，等待2秒...';
        sleep 2;
      done &&
      echo 'MySQL 已就绪' &&
      python manage.py migrate --noinput &&
      (python manage.py init_data || echo '⚠️ 演示数据初始化失败，系统继续启动') &&
      python manage.py collectstatic --noinput &&
      gunicorn server.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 120 --access-logfile - --error-logfile -
      "
    environment:
      # 数据库配置
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-db_exam}
      DB_USER: ${DB_USER:-examuser}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      # Django 配置
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      # CORS 配置
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      CSRF_EXEMPT_PATH_PREFIXES: ${CSRF_EXEMPT_PATH_PREFIXES:-/api/}
      ENABLE_RATE_LIMIT: ${ENABLE_RATE_LIMIT:-True}
      RATELIMIT_ENABLE: ${RATELIMIT_ENABLE:-True}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-False}
      # AI 配置（可选）
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      ZHIPUAI_MODEL: ${ZHIPUAI_MODEL:-glm-4-flash}
      ZHIPUAI_BASE_URL: ${ZHIPUAI_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      # 其他配置
      PYTHONUNBUFFERED: 1
    volumes:
      - ./source/server:/app
      - static_files_prod:/app/staticfiles
      - media_files_prod:/app/media
    ports:
      - "0.0.0.0:8000:8000"  # 允许外部访问（ALB 需要）
    networks:
      - fyp_network_prod
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/').read()\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Vue.js 前端服务（生产模式：静态文件 + Nginx）
  frontend:
    build:
      context: ./source/client
      dockerfile: ../../docker/frontend/Dockerfile.prod
    container_name: fyp_frontend_prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - fyp_network_prod
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mysql_data_prod:
    driver: local
  static_files_prod:
    driver: local
  media_files_prod:
    driver: local

networks:
  fyp_network_prod:
    driver: bridge


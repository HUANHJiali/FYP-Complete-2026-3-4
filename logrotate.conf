# Log Rotation Configuration for FYP Project
# Place this in /etc/logrotate.d/fyp-project

/var/log/exam/*.log {
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        systemctl reload gunicorn >/dev/null 2>&1 || true
    endscript
}

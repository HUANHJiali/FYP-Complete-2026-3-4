services:
  # MySQL 数据库服务
  db:
    image: mysql:8.0
    container_name: fyp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: db_exam
      MYSQL_USER: examuser
      MYSQL_PASSWORD: exam123456
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      # 采用 Django 迁移建表，避免与历史 SQL 结构冲突
      # - ./database/db_exam.sql:/docker-entrypoint-initdb.d/01-structure.sql
      # - ./database/init_default_users.sql:/docker-entrypoint-initdb.d/03-default-users.sql
    ports:
      - "3307:3306"
    networks:
      - fyp_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django 后端服务
  backend:
    build:
      context: ./source/server
      dockerfile: ../../docker/backend/Dockerfile
    container_name: fyp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
      echo '等待数据库就绪...' &&
      until python -c \"import pymysql; pymysql.connect(host='db',user='examuser',password='exam123456',db='db_exam').close()\" 2>/dev/null; do
        echo '  MySQL 尚未就绪，等待 2 秒...';
        sleep 2;
      done &&
      echo 'MySQL 已就绪，开始初始化...' &&
      python manage.py migrate --noinput &&
      (python tools/seed_default_users.py || echo '⚠️ 默认账号初始化失败，系统继续启动') &&
      (python manage.py init_data || echo '⚠️ 演示数据初始化失败，系统继续启动') &&
      python manage.py collectstatic --noinput || true &&
      echo '启动 Gunicorn...' &&
      gunicorn server.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 120 --reload
      "
    environment:
      # 数据库配置
      DATABASE_URL: mysql://examuser:exam123456@db:3306/db_exam
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: db_exam
      DB_USER: examuser
      DB_PASSWORD: exam123456
      # Django 配置
      # ⚠️ 安全警告：生产环境必须修改以下配置！
      # 1. DEBUG 必须设置为 "False"
      # 2. SECRET_KEY 必须使用强随机密钥
      # 3. 参考 .env.production.example 文件
      SECRET_KEY: django-insecure-bh^5636f!$(au7fy^nzn()6*4ht974p(&pzcd&9z_**=t%^+^4
      DEBUG: "True"  # ⚠️ 生产环境改为 "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend  # ⚠️ 生产环境改为实际域名
      # CORS 配置
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      CSRF_EXEMPT_PATH_PREFIXES: /api/
      ENABLE_RATE_LIMIT: "True"
      RATELIMIT_ENABLE: "True"
      TRUST_PROXY_HEADERS: "False"
      # AI 配置（可选）
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      ZHIPUAI_MODEL: glm-4-flash
      ZHIPUAI_BASE_URL: https://open.bigmodel.cn/api/paas/v4
    volumes:
      - ./source/server:/app
    ports:
      - "8000:8000"
    networks:
      - fyp_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/simple/').read()\" 2>/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 40s
    stdin_open: true
    tty: true

  # Vue.js 前端服务
  frontend:
    build:
      context: ./source/client
      dockerfile: ../../docker/frontend/Dockerfile
    container_name: fyp_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Docker 内 proxy 直接访问后端容器，无需经过宿主机
      - VUE_APP_BACKEND_URL=http://backend:8000
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./source/client:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    networks:
      - fyp_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://127.0.0.1:8080',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));\""]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 80s
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:
    driver: local

networks:
  fyp_network:
    driver: bridge

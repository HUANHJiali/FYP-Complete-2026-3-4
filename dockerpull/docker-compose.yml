services:
  # ---------- MySQL ----------
  db:
    image: alotovsky/25fyp-mysql:8.0          # <-- your image
    container_name: 25fyp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: db_exam
      MYSQL_USER: examuser
      MYSQL_PASSWORD: exam123456
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      # If you still want the init scripts, mount them from host:
      # - ./database/db_exam.sql:/docker-entrypoint-initdb.d/01-structure.sql
      # - ./database/init_practice_data.sql:/docker-entrypoint-initdb.d/02-init-data.sql
    ports:
      - "3307:3306"
    networks:
      - fyp_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Django Backend ----------
  backend:
    image: alotovsky/25fyp-backend:v2.5      # <-- your image
    container_name: 25fyp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
      echo 'Waiting for DB...' &&
      until python -c \"import pymysql; pymysql.connect(host='db',user='examuser',password='exam123456',db='db_exam').close()\" 2>/dev/null; do
        echo '  MySQL not ready, wait 2s...';
        sleep 2;
      done &&
      python manage.py migrate --noinput &&
      (python manage.py shell -c \"from app import models; c,_=models.Colleges.objects.get_or_create(id=1, defaults={'name':'默认学院','createTime':'2026-01-01 00:00:00'}); g,_=models.Grades.objects.get_or_create(id=1, defaults={'name':'默认班级','createTime':'2026-01-01 00:00:00'}); a,_=models.Users.objects.get_or_create(id='ADMIN001', defaults={'userName':'admin','passWord':'123456','name':'系统管理员','gender':'男','age':30,'type':0}); t,_=models.Users.objects.get_or_create(id='TEACHER001', defaults={'userName':'teacher','passWord':'123456','name':'教师账户','gender':'男','age':32,'type':1}); s,_=models.Users.objects.get_or_create(id='STUDENT001', defaults={'userName':'student','passWord':'123456','name':'学生账户','gender':'男','age':18,'type':2}); models.Teachers.objects.get_or_create(user=t, defaults={'phone':'13800000000','record':'本科','job':'讲师'}); models.Students.objects.get_or_create(user=s, defaults={'grade':g,'college':c}); print('default users ready')\" || echo 'seed users skipped') &&
      python manage.py collectstatic --noinput || true &&
      python manage.py runserver 0.0.0.0:8000
      "
    environment:
      DATABASE_URL: mysql://examuser:exam123456@db:3306/db_exam
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: db_exam
      DB_USER: examuser
      DB_PASSWORD: exam123456
      SECRET_KEY: django-insecure-bh^5636f!$(au7fy^nzn()6*4ht974p(&pzcd&9z_**=t%^+^4
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      CSRF_EXEMPT_PATH_PREFIXES: /api/
      ENABLE_RATE_LIMIT: "True"
      RATELIMIT_ENABLE: "True"
      TRUST_PROXY_HEADERS: "False"
      ZHIPUAI_API_KEY: ""
      ZHIPUAI_MODEL: glm-4-air
      ZHIPUAI_BASE_URL: https://open.bigmodel.cn/api/paas/v4
    ports:
      - "8000:8000"
    networks:
      - fyp_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/').read()\" 2>/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 40s
    stdin_open: true
    tty: true

  # ---------- Vue Frontend ----------
  frontend:
    image: alotovsky/25fyp-frontend:v2.5     # <-- your image
    container_name: 25fyp_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VUE_APP_API_BASE_URL=http://localhost:8000
    ports:
      - "8080:8080"
    networks:
      - fyp_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://127.0.0.1:8080',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));\""]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 80s
    stdin_open: true
    tty: true

volumes:
  mysql_data:
    driver: local

networks:
  fyp_network:
    driver: bridge

name: CDK Deploy to AWS

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS Region
        required: true
        default: us-east-1
      deploy:
        description: true=deploy, false=destroy
        required: true
        default: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ github.event.inputs.region }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories
        run: |
          aws ecr describe-repositories --repository-names fyp-backend >/dev/null 2>&1 || aws ecr create-repository --repository-name fyp-backend
          aws ecr describe-repositories --repository-names fyp-frontend >/dev/null 2>&1 || aws ecr create-repository --repository-name fyp-frontend

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $REGISTRY/fyp-backend:latest -f docker/backend/Dockerfile source/server
          docker push $REGISTRY/fyp-backend:latest

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $REGISTRY/fyp-frontend:latest -f docker/frontend/Dockerfile.prod source/client
          docker push $REGISTRY/fyp-frontend:latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CDK dependencies
        run: |
          cd infrastructure/cdk
          npm install

      - name: CDK bootstrap
        run: |
          cd infrastructure/cdk
          npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ github.event.inputs.region }}

      - name: CDK deploy or destroy
        env:
          BACKEND_IMAGE_URI: ${{ steps.ecr-login.outputs.registry }}/fyp-backend:latest
          FRONTEND_IMAGE_URI: ${{ steps.ecr-login.outputs.registry }}/fyp-frontend:latest
        run: |
          cd infrastructure/cdk
          if [ "${{ github.event.inputs.deploy }}" = "true" ]; then
            npx cdk deploy --require-approval never \
              -c backendImageUri=$BACKEND_IMAGE_URI \
              -c frontendImageUri=$FRONTEND_IMAGE_URI \
              -c dbName=db_exam
          else
            npx cdk destroy --force
          fi
